repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
    -   id: prettier
        types_or: [javascript, css, html, json, markdown]

-   repo: local
    hooks:
    -   id: check-root-files
        name: check-root-files
        entry: python scripts/check_root_files.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: check-version
        name: check-version
        entry: python scripts/check_version.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: audit-production-dependencies
        name: audit-production-dependencies
        entry: python scripts/audit_production_dependencies.py
        language: python
        pass_filenames: false
        always_run: true
